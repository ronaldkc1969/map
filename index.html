<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たのしい！都道府県クイズ</title>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; background-color: #f0f8ff; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #ff6b6b; font-size: 24px; }
        .menu-btn { display: block; width: 80%; margin: 10px auto; padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; }
        .btn-loc { background-color: #4ecdc4; color: white; }
        .btn-cap { background-color: #ff9f43; color: white; }
        .btn-loc:hover, .btn-cap:hover { opacity: 0.8; transform: scale(1.05); }
        
        #game-area { display: none; }
        .map-container { width: 100%; height: 300px; background: #e0f7fa; border-radius: 10px; margin: 20px 0; position: relative; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .question-text { font-size: 22px; font-weight: bold; margin: 20px 0; color: #2d3436; }
        
        .ans-btn { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: 2px solid #ddd; background: white; }
        .hint-btn { background-color: #a29bfe; color: white; border: none; }
        .check-btn { font-size: 20px; padding: 15px 30px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; color: white; }
        .correct { background-color: #2ecc71; }
        .wrong { background-color: #ff7675; }
        
        #result-display { font-size: 28px; font-weight: bold; color: #d63031; margin-top: 10px; min-height: 40px; }
        #hint-area { margin: 10px; color: #636e72; font-style: italic; }
        .back-btn { margin-top: 20px; background: none; border: none; color: #0984e3; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1>🗾 都道府県クイズ 🗾</h1>
        <p>どれであそぶ？</p>
        <button class="menu-btn btn-loc" onclick="startGame('location')">📍 ばしょクイズ</button>
        <button class="menu-btn btn-cap" onclick="startGame('capital')">🏢 けんちょう所在地クイズ</button>
    </div>

    <div id="game-area">
        <div id="mode-title" style="font-weight: bold; color: #74b9ff;"></div>
        
        <div id="map-display" class="map-container">
            <div id="map-target" style="font-size: 50px;">❓</div>
        </div>

        <div class="question-text" id="question"></div>
        
        <div id="hint-area"></div>
        <button id="btn-show-hint" class="ans-btn hint-btn" onclick="showHint()">ヒントをみる</button>
        <button id="btn-show-ans" class="ans-btn" onclick="showAnswer()">こたえをみる</button>

        <div id="answer-section" style="display:none;">
            <div id="result-display"></div>
            <p>せいかい できたかな？</p>
            <button class="check-btn correct" onclick="judge(true)">⭕ できた！</button>
            <button class="check-btn wrong" onclick="judge(false)">❌ だめだった</button>
        </div>

        <br>
        <button class="back-btn" onclick="location.reload()">メニューにもどる</button>
    </div>
</div>

<script>
    const prefs = [
        {name: "北海道", cap: "札幌市", region: "北海道"},
        {name: "青森県", cap: "青森市", region: "東北"},
        {name: "岩手県", cap: "盛岡市", region: "東北"},
        {name: "宮城県", cap: "仙台市", region: "東北"},
        {name: "秋田県", cap: "秋田市", region: "東北"},
        {name: "東京都", cap: "新宿区", region: "関東"},
        {name: "神奈川県", cap: "横浜市", region: "関東"},
        {name: "大阪府", cap: "大阪市", region: "近畿"},
        {name: "京都府", cap: "京都市", region: "近畿"},
        {name: "福岡県", cap: "福岡市", region: "九州"},
        {name: "沖縄県", cap: "那覇市", region: "九州"}
        // データの簡略化のため一部抜粋。全47都道府県追加可能です。
    ];

    let currentMode = '';
    let currentPref = {};
    let synth = window.speechSynthesis;

    function startGame(mode) {
        currentMode = mode;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        currentPref = prefs[Math.floor(Math.random() * prefs.length)];
        document.getElementById('answer-section').style.display = 'none';
        document.getElementById('hint-area').innerText = '';
        document.getElementById('result-display').innerText = '';
        document.getElementById('btn-show-hint').style.visibility = 'visible';
        
        if (currentMode === 'location') {
            document.getElementById('mode-title').innerText = '📍 この場所はどこかな？';
            document.getElementById('map-display').style.display = 'flex';
            document.getElementById('question').innerText = "赤い印の都道府県名は？";
            document.getElementById('map-target').innerText = "📍"; 
            // 本来はここでSVGの特定IDを赤く塗る処理を入れる
        } else {
            document.getElementById('mode-title').innerText = '🏢 県庁所在地（けんちょうしょざいち）を当てよう！';
            document.getElementById('map-display').style.display = 'none';
            document.getElementById('question').innerText = currentPref.name + " の県庁所在地は？";
        }
    }

    function showHint() {
        let wrongPref = prefs.filter(p => p.name !== currentPref.name)[Math.floor(Math.random() * (prefs.length-1))];
        let choice1, choice2;
        
        if (currentMode === 'location') {
            choice1 = currentPref.name;
            choice2 = wrongPref.name;
        } else {
            choice1 = currentPref.cap;
            choice2 = wrongPref.cap;
        }
        
        // ランダムに入れ替え
        const choices = [choice1, choice2].sort(() => Math.random() - 0.5);
        document.getElementById('hint-area').innerText = `ヒント： 「${choices[0]}」 か 「${choices[1]}」 だよ！`;
    }

    function showAnswer() {
        const ans = (currentMode === 'location') ? currentPref.name : currentPref.cap;
        document.getElementById('result-display').innerText = "正解は... " + ans;
        document.getElementById('answer-section').style.display = 'block';
        document.getElementById('btn-show-hint').style.visibility = 'hidden';
    }

    function judge(isCorrect) {
        if (isCorrect) {
            speak("すごーい！！大正解！天才だね！その調子でどんどん覚えちゃおう！");
            alert("✨ 素晴らしい！ ✨");
        } else {
            speak("惜しい！次はきっと大丈夫。もう一回やってみよう！");
        }
        nextQuestion();
    }

    function speak(text) {
        if (synth.speaking) { synth.cancel(); }
        let utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ja-JP';
        utter.pitch = 1.2; // 少し高めの声で明るく
        utter.rate = 1.0;
        synth.speak(utter);
    }
</script>

</body>
</html>
