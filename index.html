<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都道府県マスタークイズ</title>
    <style>
        :root { --main-blue: #3498db; --accent-red: #e74c3c; }
        body { font-family: sans-serif; background-color: #f0f4f8; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 地図エリアの設定 */
        #map-container { 
            position: relative; 
            width: 100%; 
            max-width: 700px; 
            margin: 0 auto; 
            border: 1px solid #ccc;
            background: #fff;
        }
        #base-map { width: 100%; height: auto; display: block; }

        /* 赤い光（オーバーレイ）のスタイル */
        .highlight {
            position: absolute;
            background-color: rgba(255, 0, 0, 0.6);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            animation: blink 1s infinite;
            transform: translate(-50%, -50%);
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* テキストとボタン */
        .question-box { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 60px; color: #333; }
        ruby rt { font-size: 0.5em; color: #888; }
        .btn { padding: 12px 24px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 5px; font-weight: bold; }
        .btn-blue { background: var(--main-blue); color: white; width: 80%; max-width: 300px; }
        .btn-hint { background: #9b59b6; color: white; }
        .btn-ans { background: #34495e; color: white; }
        .btn-choice { background: #f8f9fa; border: 2px solid #ddd; width: 180px; }
        #result-display { font-size: 28px; font-weight: bold; margin: 15px 0; }
        #menu, #game { display: none; }
        #menu { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1>🗾 都道<ruby>府県<rt>ふけん</rt></ruby>クイズ 🗾</h1>
        <p>アップロードした<ruby>地図<rt>ちず</rt></ruby>でべんきょうしよう！</p>
        <button class="btn btn-blue" onclick="start('loc')">📍 ばしょクイズ</button><br>
        <button class="btn btn-blue" onclick="start('cap')">🏢 けんちょう所在地クイズ</button>
    </div>

    <div id="game">
        <div id="map-container">
            <img src="日本地図 境界線あり白地図 (2).png" id="base-map" alt="日本地図">
            <div id="marker" class="highlight"></div>
        </div>

        <div class="question-box" id="q-text"></div>

        <div id="controls">
            <button class="btn btn-ans" onclick="showAns()">👁️ こたえをみる</button>
            <button class="btn btn-hint" onclick="showHint()">💡 ヒント (2択)</button>
        </div>

        <div id="hint-area" style="display:none;">
            <button id="c1" class="btn btn-choice" onclick="select(0)"></button>
            <button id="c2" class="btn btn-choice" onclick="select(1)"></button>
        </div>

        <div id="result-display"></div>

        <div id="next-box" style="display:none;">
            <button class="btn btn-blue" onclick="next()">つぎの問題へ 👉</button>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:blue; text-decoration:underline; cursor:pointer;">メニューにもどる</button>
    </div>
</div>

<script>
    // 地図画像上の各都道府県の位置座標（画像左上を0,0とした％指定）
    // 添付画像の形状に合わせて微調整しています
    const data = [
        {id:1, n:"北海道", c:"札幌市", x:75, y:15, s:12},
        {id:2, n:"青森県", c:"青森市", x:69, y:30, s:4},
        {id:3, n:"岩手県", c:"盛岡市", x:72, y:36, s:5},
        {id:4, n:"宮城県", c:"仙台市", x:71, y:43, s:4},
        {id:5, n:"秋田県", x:67, y:36, s:4},
        {id:13, n:"東京都", c:"新宿区", x:64, y:58, s:2},
        {id:27, n:"大阪府", c:"大阪市", x:49, y:63, s:2},
        {id:40, n:"福岡県", x:24, y:65, s:3},
        {id:47, n:"沖縄県", c:"那覇市", x:10, y:88, s:3}
        // ※サンプルとして主要な場所を抜粋。全47県分座標を定義可能です。
    ];

    let current = {}; let mode = ''; let correctIdx = 0;

    function start(m) {
        mode = m;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        next();
    }

    function next() {
        current = data[Math.floor(Math.random() * data.length)];
        document.getElementById('marker').style.display = 'none';
        document.getElementById('result-display').innerText = '';
        document.getElementById('next-box').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        document.getElementById('hint-area').style.display = 'none';

        if (mode === 'loc') {
            const m = document.getElementById('marker');
            m.style.left = current.x + '%';
            m.style.top = current.y + '%';
            m.style.width = current.s + '%';
            m.style.height = (current.s * 1.2) + '%';
            m.style.display = 'block';
            document.getElementById('q-text').innerHTML = `赤く光っている<br>都道<ruby>府県<rt>ふけん</rt></ruby>の名前は？`;
        } else {
            document.getElementById('q-text').innerHTML = `<ruby>${current.n}<rt>　</rt></ruby>の<br>けんちょう所在地は？`;
        }
    }

    function showAns() {
        const ans = mode === 'loc' ? current.n : (current.c || current.n + "市");
        document.getElementById('result-display').innerHTML = `こたえ：${ans}`;
        document.getElementById('next-box').style.display = 'block';
        document.getElementById('controls').style.display = 'none';
    }

    function showHint() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('hint-area').style.display = 'block';
        let wrong = data.filter(p => p.id !== current.id)[0];
        correctIdx = Math.floor(Math.random() * 2);
        const btn1 = document.getElementById('c1');
        const btn2 = document.getElementById('c2');
        const choices = [current, wrong];
        btn1.innerText = mode === 'loc' ? choices[correctIdx].n : (choices[correctIdx].c || choices[correctIdx].n+"市");
        btn2.innerText = mode === 'loc' ? choices[1-correctIdx].n : (choices[1-correctIdx].c || choices[1-correctIdx].n+"市");
    }

    function select(idx) {
        if(idx === correctIdx) {
            document.getElementById('result-display').innerHTML = "⭕ せいかい！";
        } else {
            document.getElementById('result-display').innerHTML = "❌ おしい！";
        }
        showAns();
    }
</script>
</body>
</html>
