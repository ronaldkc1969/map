<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>都道府県クイズ完成版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --radius-md:.75rem; --radius-lg:1rem; --radius-xl:1.5rem;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}
    body{
      font-family:'Zen Kaku Gothic New',sans-serif;font-size:1rem;line-height:1.6;color:white;
      background:radial-gradient(circle at top left,rgba(45,212,191,.18),transparent 28%),
        radial-gradient(circle at bottom right,rgba(124,58,237,.18),transparent 32%),#08111f;
      min-height:100vh;padding:1rem;
    }
    .app{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:var(--radius-xl);padding:1rem 1.5rem;backdrop-filter:blur(12px);
    }
    .brand{display:flex;align-items:center;gap:.75rem}
    .brand h1{font-size:1.25rem;font-weight:900}
    .score-bar{
      display:flex;gap:1rem;flex-wrap:wrap;align-items:center;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:var(--radius-xl);padding:.75rem 1.5rem;backdrop-filter:blur(8px);font-size:.9rem;
    }
    .score-bar strong{color:#2dd4bf}
    .judge-ok{color:#4ade80} .judge-ng{color:#f87171}
    .layout{display:grid;grid-template-columns:240px 1fr;gap:1rem}
    @media(max-width:860px){.layout{grid-template-columns:1fr}}
    .panel{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:var(--radius-xl);padding:1.5rem;backdrop-filter:blur(12px);
    }
    .menu{display:flex;flex-direction:column;gap:1rem}
    .menu h2{font-size:1rem;font-weight:900;color:#94a3b8;margin-bottom:.25rem}
    .mode-btn{
      width:100%;padding:1rem;border-radius:var(--radius-lg);border:none;cursor:pointer;
      font-family:inherit;font-weight:900;font-size:.95rem;text-align:left;line-height:1.5;
      transition:transform .15s,box-shadow .15s;
    }
    .mode-btn.map{background:linear-gradient(135deg,#0f766e,#2dd4bf);color:white}
    .mode-btn.cap{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white}
    .mode-btn.highlight{background:linear-gradient(135deg,#b45309,#f59e0b);color:white}
    .mode-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
    .workspace{display:flex;flex-direction:column;gap:.75rem}

    /* クイズ共通カード */
    .quiz-card{
      background:rgba(255,255,255,.95);color:#1e293b;border-radius:var(--radius-xl);
      overflow:hidden;display:flex;flex-direction:column;
    }
    /* 問題ヘッダー */
    .q-header{padding:1rem 1.5rem;border-bottom:1px solid #e2e8f0}
    .q-num{font-size:.75rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .q-main{font-size:1.4rem;font-weight:900;color:#0f172a;margin-top:.3rem;line-height:1.3}
    .q-sub{font-size:.85rem;color:#64748b;margin-top:.2rem}
    /* 地図 */
    .map-stage{padding:.75rem;background:#f8fafc;display:grid;place-items:center}
    #map-host{width:min(100%,720px)}
    #map-host svg{width:100%;height:auto;display:block}
    .geolonia-svg-map .prefecture{
      fill:#dbeafe;stroke:#64748b;stroke-width:.6;transition:fill .15s;
    }
    .geolonia-svg-map .prefecture.highlighted{
      fill:#f59e0b!important;stroke:#b45309!important;stroke-width:1.5;
    }
    .geolonia-svg-map .prefecture.hint-cand{
      fill:#fb923c!important;stroke:#c2410c!important;stroke-width:1.5;
    }
    .geolonia-svg-map .prefecture.answer-blue{
      fill:#3b82f6!important;stroke:#1d4ed8!important;stroke-width:2;
    }
    .geolonia-svg-map .prefecture.correct{
      fill:#34d399!important;stroke:#047857!important;stroke-width:1.5;
    }
    .geolonia-svg-map .prefecture.wrong{
      fill:#f87171!important;stroke:#b91c1c!important;stroke-width:1.5;
    }
    /* アクションエリア（県庁所在地と同じ構造） */
    .action-area{padding:.75rem 1.5rem 1.25rem;display:flex;flex-direction:column;gap:.75rem;background:white;border-top:1px solid #e2e8f0}
    /* ヒント・答えボタン行 */
    .btn-row{display:flex;gap:.75rem;flex-wrap:wrap}
    .btn{
      padding:.6rem 1.2rem;border-radius:var(--radius-md);border:none;cursor:pointer;
      font-family:inherit;font-weight:900;font-size:.9rem;transition:transform .12s,box-shadow .12s;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
    .btn-hint{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#78350f}
    .btn-answer{background:linear-gradient(135deg,#0f766e,#2dd4bf);color:white}
    .btn-ok{background:linear-gradient(135deg,#22c55e,#86efac);color:#14532d}
    .btn-ng{background:linear-gradient(135deg,#f472b6,#fb7185);color:white}
    .btn-next{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:white}
    .btn-reset{background:rgba(100,116,139,.15);color:#475569}
    .btn-back{background:rgba(100,116,139,.15);color:#475569}
    /* 三択 */
    .choices{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
    .choice-btn{
      padding:.85rem .4rem;border-radius:var(--radius-md);border:2px solid #e2e8f0;
      background:white;cursor:pointer;font-family:inherit;font-weight:700;font-size:.95rem;
      color:#1e293b;transition:all .15s;text-align:center;
    }
    .choice-btn:hover:not(:disabled){background:#f1f5f9;border-color:#94a3b8;transform:translateY(-1px)}
    .choice-btn.sel-ok{background:#dcfce7;border-color:#4ade80;color:#166534}
    .choice-btn.sel-ng{background:#fee2e2;border-color:#f87171;color:#991b1b}
    .choice-btn.reveal{background:#dcfce7;border-color:#4ade80;color:#166534}
    .choice-btn:disabled{cursor:default}
    /* 結果メッセージ */
    .result-msg{font-weight:900;font-size:1rem;padding:.5rem 0}
    .result-msg.ok{color:#166534} .result-msg.ng{color:#991b1b}
    /* 答え表示ボックス */
    .answer-box{
      padding:.85rem 1rem;border-radius:var(--radius-md);
      background:#fff7ed;color:#9a3412;font-weight:900;
      border:1px solid #fdba74;
    }
    .hidden{display:none!important}
    .flash{
      position:fixed;inset:0;display:grid;place-items:center;pointer-events:none;
      font-size:5rem;opacity:0;transform:scale(.8);transition:opacity .22s,transform .22s;z-index:100;
    }
    .flash.show{opacity:1;transform:scale(1)}
    canvas.confetti{position:fixed;inset:0;pointer-events:none;z-index:90}
    @media(max-width:600px){
      .choices{grid-template-columns:1fr 1fr}
      .choice-btn{font-size:.82rem}
    }
  </style>
</head>
<body>
  <canvas class="confetti" id="confetti"></canvas>
  <div class="flash" id="flash" aria-hidden="true"></div>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2"><path d="M7 4.5 10.5 2 12 5l3.5-1 1 3 2.5 1.5-2 3 1 3-3.5 1-1 3-3-1.5L7 19l-2-3.5L2 13l2-3 1-3 2 1.5Z"/></svg>
        <h1>🗾 都道府県クイズ</h1>
      </div>
    </header>

    <!-- スコアバー（クイズ中のみ表示） -->
    <div class="score-bar hidden" id="score-bar">
      <strong id="score-label">スコア: 0 / 0</strong>
      <span id="rate-label">正答率: 0%</span>
      <span id="judge-label">判定: —</span>
      <button class="btn btn-reset" id="btn-reset">🔄 リセット</button>
      <button class="btn btn-back" id="btn-back">🏠 メニュー</button>
    </div>

    <section class="layout">
      <!-- メニュー -->
      <aside class="panel menu">
        <h2>クイズをえらぼう</h2>
        <button class="mode-btn map" id="start-map">🗾 場所クイズ<br><span style="font-size:.8em;font-weight:500;opacity:.9;">都道府県名を見て地図で探す</span></button>
        <button class="mode-btn highlight" id="start-highlight">🟡 どこの県？クイズ<br><span style="font-size:.8em;font-weight:500;opacity:.9;">塗りつぶされた県の名前を答える</span></button>
        <button class="mode-btn cap" id="start-cap">🏛️ 県庁所在地クイズ<br><span style="font-size:.8em;font-weight:500;opacity:.9;">県庁所在地を答えよう</span></button>
      </aside>

      <!-- クイズエリア（共通1枚） -->
      <section class="workspace">
        <div class="quiz-card hidden" id="quiz-card">
          <!-- 問題 -->
          <div class="q-header">
            <div class="q-num" id="q-num">問題 1</div>
            <div class="q-main" id="q-main">—</div>
            <div class="q-sub" id="q-sub"></div>
          </div>
          <!-- 地図（場所クイズ・どこの県？クイズで使用） -->
          <div class="map-stage hidden" id="map-stage">
            <div id="map-host"><div style="padding:2rem;text-align:center;color:#64748b">地図を読み込み中…</div></div>
          </div>
          <!-- アクションエリア（全モード共通） -->
          <div class="action-area">
            <!-- ヒント・答えボタン -->
            <div class="btn-row" id="hint-answer-row">
              <button class="btn btn-hint" id="btn-hint">💡 ヒント（三択）</button>
              <button class="btn btn-answer" id="btn-answer">📝 答えを見る</button>
            </div>
            <!-- 三択 -->
            <div class="choices hidden" id="choices">
              <button class="choice-btn" id="c0"></button>
              <button class="choice-btn" id="c1"></button>
              <button class="choice-btn" id="c2"></button>
            </div>
            <!-- 答え表示ボックス -->
            <div class="answer-box hidden" id="answer-box"></div>
            <!-- 結果メッセージ -->
            <div class="result-msg hidden" id="result-msg"></div>
            <!-- ⭕❌ボタン + 次へ -->
            <div class="btn-row hidden" id="judge-row">
              <button class="btn btn-ok hidden" id="btn-ok">✅ 正解！</button>
              <button class="btn btn-ng hidden" id="btn-ng">❌ 不正解…</button>
              <button class="btn btn-next hidden" id="btn-next">▶️ 次の問題</button>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const MAP_URL = 'https://raw.githubusercontent.com/geolonia/japanese-prefectures/master/map-full.svg';
    const MAP_URL_FALLBACK = 'https://raw.githubusercontent.com/geolonia/japanese-prefectures/master/map-mobile.svg';

    const PREFS = {
      '北海道': { capital: '札幌市', code: '1' },
      '青森県': { capital: '青森市', code: '2' },
      '岩手県': { capital: '盛岡市', code: '3' },
      '宮城県': { capital: '仙台市', code: '4' },
      '秋田県': { capital: '秋田市', code: '5' },
      '山形県': { capital: '山形市', code: '6' },
      '福島県': { capital: '福島市', code: '7' },
      '茨城県': { capital: '水戸市', code: '8' },
      '栃木県': { capital: '宇都宮市', code: '9' },
      '群馬県': { capital: '前橋市', code: '10' },
      '埼玉県': { capital: 'さいたま市', code: '11' },
      '千葉県': { capital: '千葉市', code: '12' },
      '東京都': { capital: '東京', code: '13' },
      '神奈川県': { capital: '横浜市', code: '14' },
      '新潟県': { capital: '新潟市', code: '15' },
      '富山県': { capital: '富山市', code: '16' },
      '石川県': { capital: '金沢市', code: '17' },
      '福井県': { capital: '福井市', code: '18' },
      '山梨県': { capital: '甲府市', code: '19' },
      '長野県': { capital: '長野市', code: '20' },
      '岐阜県': { capital: '岐阜市', code: '21' },
      '静岡県': { capital: '静岡市', code: '22' },
      '愛知県': { capital: '名古屋市', code: '23' },
      '三重県': { capital: '津市', code: '24' },
      '滋賀県': { capital: '大津市', code: '25' },
      '京都府': { capital: '京都市', code: '26' },
      '大阪府': { capital: '大阪市', code: '27' },
      '兵庫県': { capital: '神戸市', code: '28' },
      '奈良県': { capital: '奈良市', code: '29' },
      '和歌山県': { capital: '和歌山市', code: '30' },
      '鳥取県': { capital: '鳥取市', code: '31' },
      '島根県': { capital: '松江市', code: '32' },
      '岡山県': { capital: '岡山市', code: '33' },
      '広島県': { capital: '広島市', code: '34' },
      '山口県': { capital: '山口市', code: '35' },
      '徳島県': { capital: '徳島市', code: '36' },
      '香川県': { capital: '高松市', code: '37' },
      '愛媛県': { capital: '松山市', code: '38' },
      '高知県': { capital: '高知市', code: '39' },
      '福岡県': { capital: '福岡市', code: '40' },
      '佐賀県': { capital: '佐賀市', code: '41' },
      '長崎県': { capital: '長崎市', code: '42' },
      '熊本県': { capital: '熊本市', code: '43' },
      '大分県': { capital: '大分市', code: '44' },
      '宮崎県': { capital: '宮崎市', code: '45' },
      '鹿児島県': { capital: '鹿児島市', code: '46' },
      '沖縄県': { capital: '那覇市', code: '47' }
    };

    /* ===== state ===== */
    let state = {
      mode: null, score: 0, total: 0, used: [],
      currentPref: null, locked: false, mapReady: false, hintShown: false
    };

    /* ===== score ===== */
    function updateScore(judge) {
      document.getElementById('score-label').textContent = `スコア: ${state.score} / ${state.total}`;
      const rate = state.total ? Math.round(state.score/state.total*100) : 0;
      document.getElementById('rate-label').textContent = `正答率: ${rate}%`;
      const jel = document.getElementById('judge-label');
      jel.innerHTML = judge==='ok' ? '<span class="judge-ok">判定: ⭕ 正解</span>'
                    : judge==='ng' ? '<span class="judge-ng">判定: ❌ 不正解</span>'
                    : '判定: —';
    }

    /* ===== speech ===== */
    const VOICES_OK = ['Great! You got it!', 'Correct! Well done!', 'Yes! That is right!'];
    const VOICES_NG = ['Not quite! Try again!', 'Oops! Wrong answer!', 'So close! Next time!'];
    function speak(isOk) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const msgs = isOk ? VOICES_OK : VOICES_NG;
      const text = msgs[Math.floor(Math.random()*msgs.length)];
      const u = new SpeechSynthesisUtterance(text);
      u.lang='en-US'; u.rate=1.05; u.pitch=1.2;
      const v = speechSynthesis.getVoices();
      const en = v.find(x=>x.lang==='en-US')||v.find(x=>x.lang?.startsWith('en'));
      if(en) u.voice=en;
      speechSynthesis.speak(u);
    }

    /* ===== flash / confetti ===== */
    function flash(icon) {
      const el=document.getElementById('flash');
      el.textContent=icon; el.classList.add('show');
      setTimeout(()=>el.classList.remove('show'),700);
    }
    function confetti() {
      const c=document.getElementById('confetti'),ctx=c.getContext('2d');
      c.width=innerWidth;c.height=innerHeight;
      const ps=Array.from({length:80},()=>({
        x:Math.random()*innerWidth,y:Math.random()*innerHeight*-.5,
        r:Math.random()*6+3,col:`hsl(${Math.random()*360},90%,55%)`,
        vx:(Math.random()-.5)*3,vy:Math.random()*4+2,rot:Math.random()*360
      }));
      let f=0;
      (function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        ps.forEach(p=>{
          ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
          ctx.fillStyle=p.col;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
          p.x+=p.vx;p.y+=p.vy;p.rot+=3;
        });
        if(++f<60)requestAnimationFrame(draw);
        else ctx.clearRect(0,0,c.width,c.height);
      })();
    }

    /* ===== map ===== */
    async function loadMap() {
      if (state.mapReady) return;
      const host = document.getElementById('map-host');
      try {
        const r = await fetch(MAP_URL);
        if (!r.ok) throw 0;
        host.innerHTML = await r.text();
      } catch {
        try {
          const r2 = await fetch(MAP_URL_FALLBACK);
          if (!r2.ok) throw 0;
          host.innerHTML = await r2.text();
        } catch {
          host.innerHTML = '<div style="padding:2rem;text-align:center;color:red">地図の読み込みに失敗しました</div>';
          return;
        }
      }
      const svg = host.querySelector('svg');
      if (svg) svg.classList.add('geolonia-svg-map');
      state.mapReady = true;
    }

    /* ===== prefecture node helpers ===== */
    const ROMAN = {
      hokkaido:'北海道',aomori:'青森県',iwate:'岩手県',miyagi:'宮城県',akita:'秋田県',
      yamagata:'山形県',fukushima:'福島県',ibaraki:'茨城県',tochigi:'栃木県',gunma:'群馬県',
      saitama:'埼玉県',chiba:'千葉県',tokyo:'東京都',kanagawa:'神奈川県',niigata:'新潟県',
      toyama:'富山県',ishikawa:'石川県',fukui:'福井県',yamanashi:'山梨県',nagano:'長野県',
      gifu:'岐阜県',shizuoka:'静岡県',aichi:'愛知県',mie:'三重県',shiga:'滋賀県',
      kyoto:'京都府',osaka:'大阪府',hyogo:'兵庫県',nara:'奈良県',wakayama:'和歌山県',
      tottori:'鳥取県',shimane:'島根県',okayama:'岡山県',hiroshima:'広島県',yamaguchi:'山口県',
      tokushima:'徳島県',kagawa:'香川県',ehime:'愛媛県',kochi:'高知県',fukuoka:'福岡県',
      saga:'佐賀県',nagasaki:'長崎県',kumamoto:'熊本県',oita:'大分県',miyazaki:'宮崎県',
      kagoshima:'鹿児島県',okinawa:'沖縄県'
    };
    function getPrefFromNode(node) {
      const code = node?.dataset?.code;
      if (code) {
        const found = Object.entries(PREFS).find(([,v])=>v.code===code||v.code===code.replace(/^0+/,''));
        if (found) return found[0];
      }
      for (const cls of (node?.classList||[])) {
        if (PREFS[cls]) return cls;
        if (ROMAN[cls]) return ROMAN[cls];
      }
      return '';
    }
    function findPrefNode(name) {
      return [...document.querySelectorAll('#map-host .prefecture')].find(n=>getPrefFromNode(n)===name)||null;
    }
    function clearMarks() {
      document.querySelectorAll('#map-host .prefecture').forEach(n=>n.classList.remove('highlighted','hint-cand','answer-blue','correct','wrong'));
    }

    /* ===== UI helpers ===== */
    function $id(id){return document.getElementById(id)}
    function hide(...ids){ids.forEach(id=>$id(id).classList.add('hidden'))}
    function show(...ids){ids.forEach(id=>$id(id).classList.remove('hidden'))}

    function resetActionArea() {
      state.locked = false; state.hintShown = false;
      state.mapClickEnabled = false; state.mapHintCandidates = null;
      hide('choices','answer-box','result-msg','judge-row','btn-next');
      show('hint-answer-row','btn-hint','btn-answer');
      $id('btn-ok').classList.add('hidden');
      $id('btn-ng').classList.add('hidden');
      $id('btn-next').classList.add('hidden');
      ['c0','c1','c2'].forEach(id=>{
        $id(id).className='choice-btn'; $id(id).disabled=false; $id(id).textContent='';
      });
      $id('answer-box').textContent='';
      $id('result-msg').textContent='';
    }

    function pickNext() {
      const pool = Object.keys(PREFS).filter(n=>!state.used.includes(n));
      return pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
    }
    function randomOthers(exclude, n) {
      return Object.keys(PREFS).filter(x=>x!==exclude).sort(()=>Math.random()-.5).slice(0,n);
    }

    /* ===== 正解後の共通処理 ===== */
    function afterAnswer(isOk) {
      state.locked = true;
      if(isOk){state.score++;flash('⭕');confetti();speak(true);}
      else{flash('❌');speak(false);}
      updateScore(isOk?'ok':'ng');
      state.used.push(state.currentPref);
      show('judge-row','btn-next');
    }

    /* ===== HINT: 三択表示（全モード共通） ===== */
    function showHint() {
      if (state.hintShown || state.locked) return;
      state.hintShown = true;
      hide('btn-hint');

      let opts;
      if (state.mode === 'capital') {
        // 県庁所在地の三択
        const correct = PREFS[state.currentPref].capital;
        const others = Object.values(PREFS).map(v=>v.capital).filter(c=>c!==correct).sort(()=>Math.random()-.5).slice(0,2);
        opts = [correct,...others].sort(()=>Math.random()-.5);
        setChoices(opts, (sel,btn)=>{
          const isOk = sel===correct;
          markChoices(btn, isOk, correct);
          showResultMsg(isOk, correct);
          show('judge-row','btn-next');
          afterAnswer(isOk);
        });
        show('choices');
      } else if (state.mode==='map') {
        // 場所クイズ: 地図に3県をオレンジで塗りつぶしてヒント表示
        // その後も地図クリックで答える
        const others = randomOthers(state.currentPref, 2);
        const candidates = [state.currentPref,...others].sort(()=>Math.random()-.5);
        state.mapHintCandidates = candidates;
        candidates.forEach(name=>{
          const node=findPrefNode(name);
          if(node) node.classList.add('hint-cand');
        });
        $id('q-sub').textContent='オレンジの3つの中から、正しい県をクリックしてください';
        enableMapClick();
      } else {
        // どこの県？クイズ: 都道府県名の三択
        const others = randomOthers(state.currentPref, 2);
        opts = [state.currentPref,...others].sort(()=>Math.random()-.5);
        setChoices(opts, (sel,btn)=>{
          const isOk = sel===state.currentPref;
          markChoices(btn, isOk, state.currentPref);
          showResultMsg(isOk, null);
          show('judge-row','btn-next');
          afterAnswer(isOk);
        });
        show('choices');
      }
    }

    function setChoices(opts, onSelect) {
      ['c0','c1','c2'].forEach((id,i)=>{
        const btn=$id(id);
        btn.textContent=opts[i];
        btn.className='choice-btn';
        btn.disabled=false;
        btn.onclick=()=>{ if(!state.locked) onSelect(opts[i],btn); };
      });
    }

    function markChoices(clickedBtn, isOk, correctVal) {
      ['c0','c1','c2'].forEach(id=>{
        const btn=$id(id); btn.disabled=true;
        if(btn.textContent===correctVal) btn.classList.add('reveal');
        else if(btn===clickedBtn && !isOk) btn.classList.add('sel-ng');
      });
    }

    function showResultMsg(isOk, correctVal) {
      const el=$id('result-msg');
      if(state.mode==='capital'){
        el.textContent=isOk
          ?`⭕ 正解！${state.currentPref} の県庁所在地は ${correctVal} です。`
          :`❌ ざんねん。${state.currentPref} の県庁所在地は ${correctVal} です。`;
      } else {
        el.textContent=isOk
          ?`⭕ 正解！この県は「${state.currentPref}」です。`
          :`❌ ざんねん。正解は「${state.currentPref}」でした。`;
      }
      el.className='result-msg '+(isOk?'ok':'ng');
      show('result-msg');
    }

    /* ===== 答えを見る ===== */
    function showAnswer() {
      if (state.locked) return;
      hide('btn-hint','btn-answer','choices');
      const box=$id('answer-box');
      if(state.mode==='capital'){
        box.textContent=`答え: ${state.currentPref} の県庁所在地は ${PREFS[state.currentPref].capital} です。`;
      } else {
        box.textContent=`答え: この県は「${state.currentPref}」です。`;
        const node=findPrefNode(state.currentPref);
        if(node) node.classList.add('answer-blue');
      }
      show('answer-box','judge-row');
      $id('btn-ok').classList.remove('hidden');
      $id('btn-ng').classList.remove('hidden');
    }

    /* ===== ⭕❌ボタン（答えを見た後の手動入力） ===== */
    $id('btn-ok').addEventListener('click',()=>{
      $id('btn-ok').classList.add('hidden'); $id('btn-ng').classList.add('hidden');
      afterAnswer(true);
    });
    $id('btn-ng').addEventListener('click',()=>{
      $id('btn-ok').classList.add('hidden'); $id('btn-ng').classList.add('hidden');
      afterAnswer(false);
    });

    /* ===== 次の問題 ===== */

    /* ===== 場所クイズ: 地図クリック処理 ===== */
    function enableMapClick() {
      state.mapClickEnabled = true;
    }

    document.getElementById('map-host').addEventListener('click', e => {
      if (state.mode !== 'map' || state.locked || !state.mapClickEnabled) return;
      const node = e.target.closest('.prefecture');
      if (!node) return;
      const sel = getPrefFromNode(node);
      if (!sel) return;
      state.mapClickEnabled = false;

      const isOk = sel === state.currentPref;
      // ヒント中は候補の塗りつぶしをクリア
      if (state.mapHintCandidates) {
        state.mapHintCandidates.forEach(name=>{
          const nd=findPrefNode(name);
          if(nd) nd.classList.remove('hint-cand');
        });
        state.mapHintCandidates = null;
      }
      // 選んだ県と正解を色付け
      if (isOk) {
        node.classList.add('answer-blue');
      } else {
        node.classList.add('wrong');
        const cn=findPrefNode(state.currentPref);
        if(cn) cn.classList.add('answer-blue');
      }
      showResultMsg(isOk, null);
      show('judge-row','btn-next');
      hide('hint-answer-row');
      afterAnswer(isOk);
    });

    $id('btn-next').addEventListener('click', nextQuestion);

    /* ===== 次の問題（全モード共通） ===== */
    function nextQuestion() {
      resetActionArea();
      clearMarks();
      const next = pickNext();
      if (!next) { showFinish(); return; }
      state.currentPref = next;
      $id('q-num').textContent=`問題 ${state.total+1}`;

      if (state.mode==='map') {
        $id('q-main').innerHTML=`<span style="color:#0f766e;font-size:1.2em">${next}</span>`;
        $id('q-sub').textContent='地図をクリックして答えてください（💡でヒント）';
        show('map-stage');
        enableMapClick();
      } else if (state.mode==='highlight') {
        $id('q-main').textContent='この県の名前は何ですか？';
        $id('q-sub').textContent='ヒントを見るか、答えを確認してください';
        show('map-stage');
        // 県を塗りつぶす（SVGがロード済みなので確実に動く）
        setTimeout(()=>{
          const node=findPrefNode(next);
          if(node) node.classList.add('answer-blue');
        }, 50);
      } else {
        $id('q-main').innerHTML=`<span style="color:#7c3aed;font-size:1.1em">${next}</span> の県庁所在地は？`;
        $id('q-sub').textContent='ヒントを見るか、答えを考えてください';
        hide('map-stage');
      }
    }

    function showFinish() {
      const rate=state.total?Math.round(state.score/state.total*100):0;
      $id('q-main').textContent=`全問終了！ ${state.score} / ${state.total} 正解（${rate}%）`;
      $id('q-sub').textContent='お疲れ様でした！リセットでもう一度遊べます。';
      hide('hint-answer-row','map-stage');
    }

    /* ===== スタート ===== */
    async function startQuiz(mode) {
      state = {mode, score:0, total:0, used:[], currentPref:null, locked:false, mapReady:state.mapReady, hintShown:false};
      show('score-bar','quiz-card');
      updateScore(null);
      if(mode==='map'||mode==='highlight'){
        show('map-stage');
        await loadMap();
      } else {
        hide('map-stage');
      }
      nextQuestion();
    }

    $id('start-map').addEventListener('click',()=>startQuiz('map'));
    $id('start-highlight').addEventListener('click',()=>startQuiz('highlight'));
    $id('start-cap').addEventListener('click',()=>startQuiz('capital'));
    $id('btn-hint').addEventListener('click',showHint);
    $id('btn-answer').addEventListener('click',showAnswer);
    $id('btn-reset').addEventListener('click',()=>startQuiz(state.mode));
    $id('btn-back').addEventListener('click',()=>{
      hide('score-bar','quiz-card');
      state.mode=null;
    });
  </script>
</body>
</html>
