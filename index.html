<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小4向け：都道府県マスタークイズ</title>
    <style>
        :root { --main-blue: #3498db; --main-red: #e74c3c; --bg-color: #f7f9fc; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background-color: var(--bg-color); text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid var(--main-blue); padding-bottom: 10px; }
        
        /* 地図エリア */
        #map-area { width: 100%; max-width: 600px; margin: 20px auto; border: 1px solid #ccc; background: #fff; border-radius: 10px; padding: 10px; }
        svg { width: 100%; height: auto; max-height: 450px; }
        .pref-path { fill: #fdfdfd; stroke: #666; stroke-width: 0.5; transition: 0.2s; }
        .active-pref { fill: #ff4757 !important; stroke: #c0392b; stroke-width: 1.5; animation: flash 1s infinite alternate; }
        @keyframes flash { from { fill: #ff4757; } to { fill: #ff7f50; } }

        /* 問題文・テキスト */
        .question-box { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 60px; line-height: 1.6; }
        ruby rt { font-size: 0.5em; color: #7f8c8d; }

        /* ボタン類 */
        .btn { padding: 12px 25px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; transition: 0.2s; margin: 5px; font-weight: bold; }
        .btn-menu { width: 80%; background: var(--main-blue); color: white; margin-bottom: 15px; }
        .btn-hint { background: #9b59b6; color: white; }
        .btn-show { background: #95a5a6; color: white; }
        .btn-choice { background: white; border: 3px solid #ddd; width: 180px; }
        .btn-choice:hover { background: #f0f0f0; }
        .btn-correct { background: #2ecc71; color: white; padding: 20px 40px; font-size: 24px; }
        .btn-wrong { background: #e67e22; color: white; padding: 20px 40px; font-size: 24px; }
        
        #choice-section, #self-judge-section, #result-msg { display: none; margin-top: 20px; }
        #result-msg { font-size: 30px; font-weight: bold; }
        .next-box { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; }

        #menu-screen { display: block; }
        #game-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>🗾 都道<ruby>府県<rt>ふけん</rt></ruby>クイズ 🗾</h1>
        <p>小<ruby>学<rt>がく</rt></ruby>4年生向け学習アプリ</p>
        <button class="btn btn-menu" onclick="initGame('location')">📍 場所クイズをはじめる</button><br>
        <button class="btn btn-menu" onclick="initGame('capital')">🏢 県庁所在地クイズをはじめる</button>
    </div>

    <div id="game-screen">
        <div id="map-area">
            <svg viewBox="0 0 800 550" id="japan-map">
                <g id="map-paths">
                    <path id="p1" class="pref-path" d="M635 10l15 15-5 30-30 20-40-5 5-25-15-30z"/><path id="p2" class="pref-path" d="M580 110l20 20-5 30-25 10-10-30z"/><path id="p3" class="pref-path" d="M585 170l10 50-25 5-5-50z"/><path id="p4" class="pref-path" d="M575 230l10 35-30 10-2-40z"/><path id="p5" class="pref-path" d="M555 170l10 50-15 5-15-45z"/><path id="p6" class="pref-path" d="M550 230l15 35-20 10-15-35z"/><path id="p7" class="pref-path" d="M545 275l30 5 5 40-40 5z"/><path id="p8" class="pref-path" d="M545 330l20 15-5 40-20-5z"/><path id="p9" class="pref-path" d="M530 330l15 5-5 35-15-5z"/><path id="p10" class="pref-path" d="M510 330l20 5-2 30-20-2z"/><path id="p11" class="pref-path" d="M510 370l30 5-2 20-30-2z"/><path id="p12" class="pref-path" d="M545 385l15 30-20 20-10-40z"/><path id="p13" class="pref-path" d="M510 395l25 5-5 15-20-2z"/><path id="p14" class="pref-path" d="M505 415l15 10-10 15-10-10z"/><path id="p15" class="pref-path" d="M520 270l15 5-5 45-25-10z"/><path id="p16" class="pref-path" d="M480 300l20 10-5 30-15-10z"/><path id="p17" class="pref-path" d="M465 295l15 10-10 40-15 5z"/><path id="p18" class="pref-path" d="M455 350l20 10-5 30-15 5z"/><path id="p19" class="pref-path" d="M495 375l15 2-2 25-15-2z"/><path id="p20" class="pref-path" d="M485 340l25 10-5 60-20-10z"/><path id="p21" class="pref-path" d="M465 375l18 10-5 35-15 10z"/><path id="p22" class="pref-path" d="M490 425l25 10-15 25-10-15z"/><path id="p23" class="pref-path" d="M470 425l20 10-10 25-10-15z"/><path id="p24" class="pref-path" d="M445 420l20 5-5 50-15-5z"/><path id="p25" class="pref-path" d="M435 390l15 10-5 30-12-10z"/><path id="p26" class="pref-path" d="M420 390l15 5-5 30-15-5z"/><path id="p27" class="pref-path" d="M415 430l15 5-2 30-15-10z"/><path id="p28" class="pref-path" d="M390 395l25 5 5 45-20 15-10-40z"/><path id="p29" class="pref-path" d="M430 435l10 5-5 35-10-5z"/><path id="p30" class="pref-path" d="M410 465l20 10-10 30-15-10z"/><path id="p31" class="pref-path" d="M360 390l25 5-5 25-25-5z"/><path id="p32" class="pref-path" d="M320 395l35 5-5 25-35-5z"/><path id="p33" class="pref-path" d="M355 425l30 5-5 30-30-5z"/><path id="p34" class="pref-path" d="M320 430l30 5-5 30-30-5z"/><path id="p35" class="pref-path" d="M295 425l22 5-5 35-22-5z"/><path id="p36" class="pref-path" d="M330 475l30 5-15 20-15 5z"/><path id="p37" class="pref-path" d="M325 465l30 5-5 10-25-2z"/><path id="p38" class="pref-path" d="M290 475l35 5-10 25-25-5z"/><path id="p39" class="pref-path" d="M305 500l35 5-10 25-30-5z"/><path id="p40" class="pref-path" d="M260 440l25 10-10 25-15-10z"/><path id="p41" class="pref-path" d="M235 450l20 5-5 20-15-5z"/><path id="p42" class="pref-path" d="M225 470l15 5-10 30-15-15z"/><path id="p43" class="pref-path" d="M235 480l20 10-5 40-15-10z"/><path id="p44" class="pref-path" d="M265 475l20 10-10 40-15-10z"/><path id="p45" class="pref-path" d="M255 520l15 10-5 45-15-10z"/><path id="p46" class="pref-path" d="M230 535l20 10-10 40-20-10z"/><path id="p47" class="pref-path" d="M100 500l30 5-5 10-30-5z"/></g>
            </svg>
        </div>

        <div class="question-box" id="q-text"></div>

        <div id="action-btns">
            <button class="btn btn-hint" onclick="showHintChoices()">💡 ヒント (2<ruby>択<rt>たく</rt></ruby>)</button>
            <button class="btn btn-show" onclick="showAnswerSelf()">👁️ こたえをみる</button>
        </div>

        <div id="choice-section">
            <p>どっちかな？</p>
            <button id="c1" class="btn btn-choice" onclick="checkChoice(0)"></button>
            <button id="c2" class="btn btn-choice" onclick="checkChoice(1)"></button>
        </div>

        <div id="self-judge-section">
            <p>せいかい できたかな？</p>
            <button class="btn btn-correct" onclick="judgeFinal(true)">⭕ できた！</button>
            <button class="btn btn-wrong" onclick="judgeFinal(false)">❌ ざんねん</button>
        </div>

        <div id="result-msg"></div>

        <div class="next-box">
            <button class="btn btn-menu" style="width:auto;" onclick="nextQuestion()">つぎの<ruby>問題<rt>もんだい</rt></ruby>へ</button><br>
            <button class="btn" style="background:none; color:blue; text-decoration:underline;" onclick="location.reload()">メニューにもどる</button>
        </div>
    </div>
</div>

<script>
    // JISコード順 全47都道府県データ
    const masterData = [
        {id:1, n:"北海道", nr:"ほっかいどう", c:"札幌市", cr:"さっぽろし"}, {id:2, n:"青森県", nr:"あおもりけん", c:"青森市", cr:"あおもりし"},
        {id:3, n:"岩手県", nr:"いわてけん", c:"盛岡市", cr:"もりおかし"}, {id:4, n:"宮城県", nr:"みやぎけん", c:"仙台市", cr:"せんだいし"},
        {id:5, n:"秋田県", nr:"あきたけん", c:"秋田市", cr:"あきたし"}, {id:6, n:"山形県", nr:"やまがたけん", c:"山形市", cr:"やまがたし"},
        {id:7, n:"福島県", nr:"ふくしまけん", c:"福島市", cr:"ふくしまし"}, {id:8, n:"茨城県", nr:"いばらきけん", c:"水戸市", cr:"みとし"},
        {id:9, n:"栃木県", nr:"とちぎけん", c:"宇都宮市", cr:"うつのみやし"}, {id:10, n:"群馬県", nr:"ぐんまけん", c:"前橋市", cr:"まえばしし"},
        {id:11, n:"埼玉県", nr:"さいたまけん", c:"さいたま市", cr:"さいたまし"}, {id:12, n:"千葉県", nr:"ちばけん", c:"千葉市", cr:"ちばし"},
        {id:13, n:"東京都", nr:"とうきょうと", c:"新宿区", cr:"しんじゅくく"}, {id:14, n:"神奈川県", nr:"かながわけん", c:"横浜市", cr:"よこはまし"},
        {id:15, n:"新潟県", nr:"にいがたけん", c:"新潟市", cr:"にいがたし"}, {id:16, n:"富山県", nr:"とやまけん", c:"富山市", cr:"とやまし"},
        {id:17, n:"石川県", nr:"いしかわけん", c:"金沢市", cr:"かなざわし"}, {id:18, n:"福井県", nr:"ふくいけん", c:"福井市", cr:"ふくいし"},
        {id:19, n:"山梨県", nr:"やまなしけん", c:"甲府市", cr:"こうふし"}, {id:20, n:"長野県", nr:"ながのけん", c:"長野市", cr:"ながのし"},
        {id:21, n:"岐阜県", nr:"ぎふけん", c:"岐阜市", cr:"ぎふし"}, {id:22, n:"静岡県", nr:"しずおかけん", c:"静岡市", cr:"しずおかし"},
        {id:23, n:"愛知県", nr:"あいちけん", c:"名古屋市", cr:"なごやし"}, {id:24, n:"三重県", nr:"みえけん", c:"津市", cr:"つし"},
        {id:25, n:"滋賀県", nr:"しがけん", c:"大津市", cr:"おおつし"}, {id:26, n:"京都府", nr:"きょうとふ", c:"京都市", cr:"きょうとし"},
        {id:27, n:"大阪府", nr:"おおさかふ", c:"大阪市", cr:"おおさかし"}, {id:28, n:"兵庫県", nr:"ひょうごけん", c:"神戸市", cr:"こうべし"},
        {id:29, n:"奈良県", nr:"ならけん", c:"奈良市", cr:"ならし"}, {id:30, n:"和歌山県", nr:"わかやまけん", c:"和歌山市", cr:"わかやまし"},
        {id:31, n:"鳥取県", nr:"とっとりけん", c:"鳥取市", cr:"とっとりし"}, {id:32, n:"島根県", nr:"しまねけん", c:"松江市", cr:"まつえし"},
        {id:33, n:"岡山県", nr:"おかやまけん", c:"岡山市", cr:"おかやまし"}, {id:34, n:"広島県", nr:"ひろしまけん", c:"広島市", cr:"ひろしまし"},
        {id:35, n:"山口県", nr:"やまぐちけん", c:"山口市", cr:"やまぐちし"}, {id:36, n:"徳島県", nr:"とくしまけん", c:"徳島市", cr:"とくしまし"},
        {id:37, n:"香川県", nr:"かがわけん", c:"高松市", cr:"たかまつし"}, {id:38, n:"愛媛県", nr:"えひめけん", c:"松山市", cr:"まつやまし"},
        {id:40, n:"福岡県", nr:"ふくおかけん", c:"福岡市", cr:"ふくおかし"}, {id:41, n:"佐賀県", nr:"さがけん", c:"佐賀市", cr:"さがし"},
        {id:42, n:"長崎県", nr:"ながさきけん", c:"長崎市", cr:"ながさきし"}, {id:43, n:"熊本県", nr:"くまもとけん", c:"熊本市", cr:"くまもとし"},
        {id:44, n:"大分県", nr:"おおいたけん", c:"大分市", cr:"おおいたし"}, {id:45, n:"宮崎県", nr:"みやざきけん", c:"宮崎市", cr:"みやざきし"},
        {id:46, n:"鹿児島県", nr:"かごしまけん", c:"鹿児島市", cr:"かごしまし"}, {id:47, n:"沖縄県", nr:"おきなわけん", c:"那覇市", cr:"なはし"},
        {id:39, n:"高知県", nr:"こうちけん", c:"高知市", cr:"こうちし"}
    ];

    const praises = [
        "すごーい！天才じゃん！", "大正解！その調子だよ！", "やったね！完ペキだ！",
        "素晴らしい！地図博士だね！", "正解！きみの努力は本物だ！"
    ];

    let mode = '';
    let currentPref = {};
    let correctChoiceIdx = 0;
    let synth = window.speechSynthesis;

    function initGame(m) {
        mode = m;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        // 表示クリア
        document.querySelectorAll('.active-pref').forEach(p => p.classList.remove('active-pref'));
        document.getElementById('choice-section').style.display = 'none';
        document.getElementById('self-judge-section').style.display = 'none';
        document.getElementById('result-msg').style.display = 'none';
        document.getElementById('action-btns').style.display = 'block';

        // ランダム出題
        currentPref = masterData[Math.floor(Math.random() * masterData.length)];
        
        if (mode === 'location') {
            document.getElementById('japan-map').parentElement.style.display = 'block';
            document.getElementById('p' + currentPref.id).classList.add('active-pref');
            document.getElementById('q-text').innerHTML = `赤いところの<ruby>都道<rt>とどう</rt>府<rt>ふ</rt>県<rt>けん</rt>名<rt>めい</rt></ruby>は？`;
        } else {
            document.getElementById('japan-map').parentElement.style.display = 'none';
            document.getElementById('q-text').innerHTML = `<ruby>${currentPref.n}<rt>${currentPref.nr}</rt></ruby>の<br><ruby>県庁<rt>けんちょう</rt>所在地<rt>しょざいち</rt></ruby>は？`;
        }
    }

    // ヒントを表示（2択）
    function showHintChoices() {
        document.getElementById('action-btns').style.display = 'none';
        document.getElementById('choice-section').style.display = 'block';
        
        let wrongPref = masterData.filter(p => p.id !== currentPref.id)[Math.floor(Math.random() * (masterData.length - 1))];
        correctChoiceIdx = Math.floor(Math.random() * 2);
        
        const choices = [];
        if (mode === 'location') {
            choices[correctChoiceIdx] = `<ruby>${currentPref.n}<rt>${currentPref.nr}</rt></ruby>`;
            choices[1 - correctChoiceIdx] = `<ruby>${wrongPref.n}<rt>${wrongPref.nr}</rt></ruby>`;
        } else {
            choices[correctChoiceIdx] = `<ruby>${currentPref.c}<rt>${currentPref.cr}</rt></ruby>`;
            choices[1 - correctChoiceIdx] = `<ruby>${wrongPref.c}<rt>${wrongPref.cr}</rt></ruby>`;
        }

        document.getElementById('c1').innerHTML = choices[0];
        document.getElementById('c2').innerHTML = choices[1];
    }

    function checkChoice(idx) {
        if (idx === correctChoiceIdx) judgeFinal(true);
        else judgeFinal(false);
    }

    // 自力回答
    function showAnswerSelf() {
        document.getElementById('action-btns').style.display = 'none';
        const ansText = mode === 'location' ? `${currentPref.n} (${currentPref.nr})` : `${currentPref.c} (${currentPref.cr})`;
        document.getElementById('result-msg').style.display = 'block';
        document.getElementById('result-msg').innerHTML = `<span style="font-size:16px; color:#666;">こたえ：</span><br>${ansText}`;
        document.getElementById('self-judge-section').style.display = 'block';
    }

    function judgeFinal(isCorrect) {
        document.getElementById('choice-section').style.display = 'none';
        document.getElementById('self-judge-section').style.display = 'none';
        document.getElementById('result-msg').style.display = 'block';
        
        if (isCorrect) {
            document.getElementById('result-msg').innerHTML = `<span style="color:red">⭕ 正解！</span><br><span style="font-size:18px">${mode==='location'?currentPref.n:currentPref.c}</span>`;
            speak(praises[Math.floor(Math.random() * praises.length)]);
        } else {
            document.getElementById('result-msg').innerHTML = `<span style="color:blue">❌ 残念！</span><br><span style="font-size:18px">正解は ${mode==='location'?currentPref.n:currentPref.c} だよ</span>`;
            speak("次はがんばろう！");
        }
    }

    function speak(text) {
        if (synth.speaking) synth.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.pitch = 1.3;
        synth.speak(u);
    }
</script>

</body>
</html>
